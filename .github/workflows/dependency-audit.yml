name: Dependency audit

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable Corepack
        run: corepack enable
      - name: Regenerate lockfile for proposed dependency pins
        run: pnpm install --lockfile-only --no-frozen-lockfile
      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile
      - name: Create production dependency audit
        run: pnpm audit --prod --json > audit-production.json || true
      - name: Create full dependency audit
        run: pnpm audit --json > audit-full.json || true
      - name: Upload audit results and generated lockfile
        uses: actions/upload-artifact@v4
        with:
          name: dependency-audit
          path: |
            audit-*.json
            pnpm-lock.yaml
          if-no-files-found: error
          retention-days: 7
