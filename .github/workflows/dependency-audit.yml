name: Dependency audit

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable Corepack
        run: corepack enable
      - name: Resolve proposed dependency pins
        run: |
          set +e
          pnpm install --lockfile-only --no-frozen-lockfile > lockfile-sync.log 2>&1
          status=$?
          cat lockfile-sync.log
          echo "resolver_exit_code=$status" >> lockfile-sync.log
          exit 0
      - name: Upload resolver output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-audit
          path: |
            lockfile-sync.log
            pnpm-lock.yaml
          if-no-files-found: error
          retention-days: 7
