name: Dependabot status

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: read

jobs:
  open-alerts:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch open Dependabot alerts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl --fail --silent --show-error \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/dependabot/alerts?state=open&per_page=100" \
            -o dependabot-alerts.json
          node -e 'const fs=require("fs"); const a=JSON.parse(fs.readFileSync("dependabot-alerts.json","utf8")); console.log(`open_dependabot_alerts=${a.length}`); for (const x of a) console.log(`${x.number}\t${x.dependency.package.name}\t${x.dependency.manifest_path}\t${x.security_advisory.ghsa_id}\t${x.security_advisory.severity}`);'
      - uses: actions/upload-artifact@v4
        with:
          name: dependabot-alerts
          path: dependabot-alerts.json
          retention-days: 1
